<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Molten</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Dev-only: Bridge for Rust API server to call frontend functions.
      // Rust calls eval("window.__moltenExec('session.create')") via WebView.
      // This script is in global scope so it's always available.
      window.__moltenExec = function(action) {
        document.dispatchEvent(new CustomEvent('molten-cmd', { detail: action }));
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
